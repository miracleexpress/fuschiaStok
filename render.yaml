services:
  - type: web
    name: fuschia-stock-panel
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: fuschia-db
          property: connectionString

databases:
  - name: fuschia-db
    plan: free
    databaseName: fuschia_stock
    user: fuschia_admin
